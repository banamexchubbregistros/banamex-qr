<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redirigiendo | Banamex</title>

  <!-- 
    Reemplaza G-XXXXXXXXXX con tu Measurement ID de Google Analytics 4.
    Ejemplo: G-ABCD123456
  -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-XXXXXXXXXX', {
      page_title: 'QR Banamex Chubb - Mundial Fan Fest',
      page_location: window.location.href
    });

    // Evento personalizado para identificar claramente los escaneos del QR
    gtag('event', 'qr_scan', {
      campaign_name: 'banamex_chubb_mundial_fanfest',
      destination_url: 'https://www.banamex-chubb.com/seguro-de-viaje/producto?utm_medium=experiencia+banamex&utm_source=qr+code&utm_campaign=vending+machine&utm_content=a'
    });
  </script>

  <meta http-equiv="refresh" content="1.2; url=https://www.banamex-chubb.com/seguro-de-viaje/producto?utm_medium=experiencia+banamex&utm_source=qr+code&utm_campaign=vending+machine&utm_content=a" />

  <style>
    :root {
      --banamex-red: #e1251b;
      --banamex-blue: #003b71;
      --text: #1a1a1a;
      --muted: #666;
      --bg: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: 100%;
      max-width: 440px;
      text-align: center;
    }

    .mark {
      width: 82px;
      height: 82px;
      border-radius: 50%;
      margin: 0 auto 24px;
      display: grid;
      place-items: center;
      border: 8px solid var(--banamex-red);
      color: var(--banamex-blue);
      font-weight: 700;
      letter-spacing: -0.04em;
      font-size: 22px;
    }

    h1 {
      font-size: 22px;
      line-height: 1.25;
      margin: 0 0 10px;
      color: var(--banamex-blue);
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .loader {
      width: 42px;
      height: 42px;
      border: 4px solid #eee;
      border-top-color: var(--banamex-red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 28px auto 20px;
    }

    a {
      color: var(--banamex-blue);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>

  <script>
    // Redirección con pequeño retraso para permitir que Analytics registre el evento
    setTimeout(function () {
      window.location.href = "https://www.banamex-chubb.com/seguro-de-viaje/producto?utm_medium=experiencia+banamex&utm_source=qr+code&utm_campaign=vending+machine&utm_content=a";
    }, 1200);
  </script>
</head>

<body>
  <main>
    <div class="mark" aria-label="Banamex">b</div>
    <h1>Redirigiendo a la experiencia Banamex</h1>
    <p>Estamos preparando tu acceso al seguro de viaje Banamex-Chubb.</p>
    <div class="loader" aria-hidden="true"></div>
    <p>
      Si no eres redirigido automáticamente,
      <a href="https://www.banamex-chubb.com/seguro-de-viaje/producto?utm_medium=experiencia+banamex&utm_source=qr+code&utm_campaign=vending+machine&utm_content=a">haz clic aquí</a>.
    </p>
  </main>
</body>
</html>
